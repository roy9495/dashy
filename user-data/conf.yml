pageInfo:
  title: Cyber News
  description:
  navLinks:
  - title: Portfolio
    path: https://portfolio-roy9495.vercel.app/
  - title: Github
    path: https://github.com/roy9495
  - title: Blog
    path: https://threatradar.vercel.app/

appConfig:
  theme: colorful
  fontAwesomeKey: c94dc2b452
  hideComponents:
    hideSearch: true
    hideSettings: true
    hideSplashScreen: true

sections:
- name: Hacker News
  icon: fad fa-newspaper
  displayData:
    rows: 2
  widgets:
  - type: hackernews-trending
    options:
      stories: newstories
      limit: 8

- name: Tech News
  icon: fad fa-newspaper
  displayData:
    rows: 2
  widgets:
  - type: hackernews-trending
    options:
      stories: beststories
      limit: 8

- name: More News
  icon: fad fa-newspaper
  displayData:
    rows: 2
  widgets:
  - type: hackernews-trending
    options:
      stories: topstories
      limit: 8
   

- name: Vulnarability Chart
  icon: fad fa-chart-scatter
  displayData:
    cols: 2
    rows: 2
  widgets:
  - type: embed
    options:
      html: <img class="utxo-chart" src="https://dl.acm.org/cms/attachment/230be2cb-98a5-4197-be48-6350fd3dceee/f4.jpg" />
      css: '.utxo-chart { width: 100%}'

- name: Exchange Rates
  icon: fad fa-pound-sign
  widgets:
  - type: exchange-rates
    options:
      apiKey: 00fee8a2d9492a7f2ad5f1b9
      inputCurrency: USD
      outputCurrencies:
        - INR
        - GBP
        - EUR
        - JPY
        - HKD
        - AUD
        - CAD
        - CHF
        - RUB
        - CNY